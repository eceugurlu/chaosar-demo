<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ChaosAR - Premium 3D Viewer</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

  <style>
    :root {
      --base: #020202; --accent: #B2D5E5; --accent-dim: rgba(178, 213, 229, 0.12);
      --accent-glow: rgba(178, 213, 229, 0.30); --text-primary: #EDF6FA;
      --surface: rgba(6, 16, 24, 0.90); --border: rgba(178, 213, 229, 0.13);
      --radius: 24px; --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--base); color: var(--text-primary); min-height: 100dvh; overflow: hidden; }
    
    .viewer-page { position: relative; width: 100%; min-height: 100dvh; display: flex; flex-direction: column; }
    
    /* Üst Bar */
    .top-bar { position: absolute; inset: 0 0 auto 0; z-index: 10; padding: 20px; display: flex; justify-content: space-between; pointer-events: none; }
    .product-label { display: flex; flex-direction: column; }
    .name { font-size: 20px; font-weight: 700; }
    
    /* Bilgi Butonu */
    .info-btn { pointer-events: auto; width: 36px; height: 36px; border-radius: 50%; background: rgba(178, 213, 229, 0.15); border: 0.5px solid var(--border); color: var(--accent); display: flex; align-items: center; justify-content: center; backdrop-filter: blur(12px); }
    
    /* Model Viewer */
    model-viewer { width: 100%; flex: 1; min-height: 100dvh; background: transparent; }
    model-viewer::part(default-ar-button) { display: none !important; }

    /* Buton */
    .bottom-action { position: fixed; inset: auto 0 0 0; z-index: 20; padding: 0 20px 40px; }
    .ar-trigger-btn { pointer-events: auto; width: 100%; padding: 16px; border-radius: 999px; background: var(--accent); color: #081520; font-weight: 800; text-transform: uppercase; border: none; cursor: pointer; }
    
    /* Modal */
    .modal-overlay { position: fixed; inset: 0; z-index: 100; display: flex; align-items: flex-end; justify-content: center; background: rgba(2,2,2,0.8); opacity: 0; pointer-events: none; transition: opacity 300ms; }
    .modal-overlay.is-open { opacity: 1; pointer-events: all; }
    .modal-card { width: 100%; max-width: 480px; background: var(--surface); padding: 30px; border-radius: 24px 24px 0 0; }
    .confirm-btn { width: 100%; padding: 16px; background: var(--accent); color: #081520; border-radius: 999px; font-weight: 800; border: none; cursor: pointer; margin-top: 20px; }
  </style>
</head>
<body>

<div class="viewer-page">
  <div class="top-bar">
    <div class="product-label">
      <span class="name" id="displayTitle">Yükleniyor...</span>
    </div>
    <button id="infoBtn" class="info-btn">?</button>
  </div>

  <model-viewer
    id="mainViewer"
    src=""
    ios-src=""
    ar-scale="fixed"
    ar-placement="floor"
    alt="3D Model"
    camera-controls
    disable-zoom
    ar
    ar-modes="webxr scene-viewer quick-look"
    shadow-intensity="2"
    shadow-softness="0.5">
  </model-viewer>

  <div class="bottom-action">
    <button id="arTriggerBtn" class="ar-trigger-btn">Evinde Görüntüle</button>
  </div>
</div>

<div id="arModal" class="modal-overlay">
  <div class="modal-card">
    <h2>Nasıl Kullanılır?</h2>
    <p>Telefonunu yere tut ve yönlendir.</p>
    <button id="confirmARBtn" class="confirm-btn">KAMERAYI AÇ</button>
  </div>
</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const modelName = urlParams.get('model') || 'yatak'; // URL'den model adını al
  const baseUrl = "https://pub-7989d7e87c7d498ba088a95b9a8d5c73.r2.dev/"; // Senin R2 bucket linkin

  const mv = document.getElementById('mainViewer');
  
  // Linkleri dinamik ata (USDZ ve GLB kilitli)
  mv.src = `${baseUrl}${modelName}.glb`;
  mv.setAttribute('ios-src', `${baseUrl}${modelName}.usdz#allowsContentScaling=0`);
  document.getElementById('displayTitle').textContent = modelName.toUpperCase();

  const modal = document.getElementById('arModal');
  document.getElementById('arTriggerBtn').onclick = () => modal.classList.add('is-open');
  document.getElementById('infoBtn').onclick = () => modal.classList.add('is-open');
  modal.onclick = (e) => { if(e.target === modal) modal.classList.remove('is-open'); };
  
  document.getElementById('confirmARBtn').onclick = () => {
    modal.classList.remove('is-open');
    mv.activateAR();
  };
</script>

</body>
</html>
