<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ChaosAR - Zen Köşe Koltuk</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

  <style>
    :root { --base: #020202; --accent: #B2D5E5; --text-primary: #EDF6FA; }
    body { font-family: system-ui, sans-serif; background: var(--base); color: var(--text-primary); margin: 0; min-height: 100dvh; overflow: hidden; }
    .top-bar { position: absolute; inset: 0 0 auto 0; z-index: 10; padding: 20px; pointer-events: none; }
    .name { font-size: 20px; font-weight: 700; }
    model-viewer { width: 100%; height: 100dvh; }
    .bottom-action { position: fixed; inset: auto 0 0 0; z-index: 20; padding: 0 20px 40px; }
    .ar-trigger-btn { width: 100%; padding: 16px; border-radius: 999px; background: var(--accent); color: #081520; font-weight: 800; text-transform: uppercase; border: none; cursor: pointer; }
  </style>
</head>
<body>

  <div class="top-bar">
    <span class="name" id="displayTitle">Yükleniyor...</span>
  </div>

  <model-viewer
    id="mainViewer"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    disable-zoom
    shadow-intensity="2">
  </model-viewer>

  <div class="bottom-action">
    <button id="arTriggerBtn" class="ar-trigger-btn">Evinde Görüntüle</button>
  </div>

  <!-- iPhone için gizli AR linki (Garantili yöntem) -->
  <a id="iosArLink" rel="ar" href="" style="display:none;"></a>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  // Default olarak zenkoltukk dosyasını çağır
  const modelName = urlParams.get('model') || 'zenkoltukk'; 
  
  const titleMap = {
    'zenkoltukk': 'Zen Köşe Koltuk'
  };

  const mv = document.getElementById('mainViewer');
  const iosLink = document.getElementById('iosArLink');

  // GitHub'da yan yana oldukları için ./ işaretiyle çağırıyoruz
  mv.src = `./${modelName}.glb`;
  mv.setAttribute('ios-src', `./${modelName}.usdz#allowsContentScaling=0`);
  iosLink.href = `./${modelName}.usdz`; // iPhone için linki güncelle
  
  document.getElementById('displayTitle').textContent = titleMap[modelName] || 'Model';

  // AR Tetikleyici
  document.getElementById('arTriggerBtn').onclick = () => {
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    if (isIOS) {
      iosLink.click(); // iPhone ise direkt Apple'ın AR sistemini tetikle
    } else {
      mv.activateAR(); // Android ise model-viewer'ı kullan
    }
  };
</script>

</body>
</html>
