<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ChaosAR - Zen Köşe Koltuk</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

  <style>
    :root { --base: #020202; --accent: #B2D5E5; --text-primary: #EDF6FA; --border: rgba(178, 213, 229, 0.13); }
    body { font-family: system-ui, sans-serif; background: var(--base); color: var(--text-primary); margin: 0; min-height: 100dvh; overflow: hidden; }
    .top-bar { position: absolute; inset: 0 0 auto 0; z-index: 10; padding: 20px; pointer-events: none; }
    .name { font-size: 20px; font-weight: 700; }
    model-viewer { width: 100%; height: 100dvh; }
    .bottom-action { position: fixed; inset: auto 0 0 0; z-index: 20; padding: 0 20px 40px; pointer-events: none; }
    .ar-trigger-btn { pointer-events: auto; width: 100%; padding: 16px; border-radius: 999px; background: var(--accent); color: #081520; font-weight: 800; text-transform: uppercase; border: none; cursor: pointer; }
  </style>
</head>
<body>

  <div class="top-bar">
    <span class="name" id="displayTitle">Yükleniyor...</span>
  </div>

  <model-viewer
    id="mainViewer"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    disable-zoom
    shadow-intensity="2">
  </model-viewer>

  <div class="bottom-action">
    <button id="arTriggerBtn" class="ar-trigger-btn">Evinde Görüntüle</button>
  </div>

<script>
  // Cloudflare R2 bucket linkin
  const baseUrl = "https://pub-7989d7e87c7d498ba088a95b9a8d5c73.r2.dev/";
  
  const urlParams = new URLSearchParams(window.location.search);
  const modelName = urlParams.get('model') || 'zenkoltuk'; 

  // İsimlendirme mantığı (Ekrandaki yazı için)
  const titleMap = {
    'zenkoltuk': 'Zen Köşe Koltuk'
  };

  const mv = document.getElementById('mainViewer');
  
  // R2 üzerinden dosyaları çekiyoruz
  mv.src = baseUrl + modelName + '.glb';
  mv.setAttribute('ios-src', baseUrl + modelName + '.usdz#allowsContentScaling=0');
  
  // Başlığı ayarla
  document.getElementById('displayTitle').textContent = titleMap[modelName] || modelName.toUpperCase();

  // AR'ı başlat
  document.getElementById('arTriggerBtn').onclick = () => mv.activateAR();
</script>

</body>
</html>
